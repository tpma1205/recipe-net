backend:
  name: github
  repo: tpma1205/recipe-net
  branch: main
  base_url: https://recipe-oauth.tpma1205.workers.dev

local_backend: true

# 上傳照片的存放目錄
media_folder: "uploads"
public_folder: "/uploads"

# 語系
locale: "zh_Hant"

collections:
  - name: "recipes"
    label: "食譜"
    label_singular: "食譜"
    folder: "recipes"
    create: true
    slug: "{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"   # 時間戳記檔名，避免中文標題產生中文檔名
    extension: "md"
    format: "frontmatter"
    sortableFields: ["title", "commit_date"]
    summary: "{{title}} · 更新時間 {{commit_date}}"
    fields:
      - label: "食譜名稱"
        name: "title"
        widget: "string"
        required: true
        hint: "必填，1-30 字"
        pattern:
          - "^.{1,30}$"
          - "食譜名稱需在 1-30 字之間"

      - label: "類型標籤"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: true
        required: true
        min: 1
        hint: "從下拉選單挑選標籤；若沒有想要的標籤，請先到「標籤」集合新增"

      - label: "料理設備"
        name: "equipment"
        widget: "list"
        required: false
        label_singular: "設備"
        hint: "非必填，直接輸入設備名稱即可新增（常見：炒鍋、湯鍋、電鍋、烤箱、氣炸鍋、平底鍋、壓力鍋、瓦斯爐、微波爐、電磁爐、蒸鍋）"

      - label: "幾人份"
        name: "servings"
        widget: "number"
        required: false
        min: 1
        max: 20
        value_type: "int"
        hint: "非必填，1-20 人份"

      - label: "食材"
        name: "ingredients"
        widget: "list"
        required: true
        min: 1
        label_singular: "食材"
        hint: "必填至少 1 項"
        collapsed: true
        summary: "{{fields.name}} — {{fields.amount}}"
        fields:
          - label: "食材名稱"
            name: "name"
            widget: "string"
            required: true
          - label: "份量"
            name: "amount"
            widget: "string"
            required: true

      - label: "調味料"
        name: "seasonings"
        widget: "list"
        required: false
        label_singular: "調味料"
        collapsed: true
        summary: "{{fields.name}} — {{fields.amount}}"
        fields:
          - label: "調味料名稱"
            name: "name"
            widget: "string"
            required: true
          - label: "份量"
            name: "amount"
            widget: "string"
            required: true

      - label: "料理步驟"
        name: "steps"
        widget: "list"
        required: true
        min: 1
        label_singular: "步驟"
        hint: "必填至少 1 步"
        collapsed: true
        summary: "{{fields.step}}"
        field:
          label: "步驟說明"
          name: "step"
          widget: "text"

      - label: "料理照片"
        name: "photos"
        widget: "list"
        required: false
        max: 3
        label_singular: "照片"
        hint: "非必填，最多 3 張，每張上限 2MB"
        field:
          label: "照片"
          name: "photo"
          widget: "image"
          media_library:
            config:
              max_file_size: 2097152   # 2MB in bytes

      - label: "備註"
        name: "notes"
        widget: "text"
        required: false
        pattern:
          - "^[\\s\\S]{0,500}$"
          - "備註上限 500 字"
        hint: "非必填，上限 500 字"

  - name: "tags"
    label: "標籤"
    label_singular: "標籤"
    folder: "tags"
    create: true
    slug: "{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"   # 時間戳記檔名，避免中文標籤產生中文檔名
    extension: "md"
    format: "frontmatter"
    summary: "{{fields.name}}"
    fields:
      - label: "標籤名稱"
        name: "name"
        widget: "string"
        required: true
        hint: "例如：主食、湯、小菜、甜點、快炒、台式、日式、西式、韓式、早餐、點心"
